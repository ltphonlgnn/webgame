<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Web Game + Kiếm Xu</title>

<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

.box{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    width:300px;
    margin:auto;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:6px;
    background:#22c55e;
    color:white;
    font-size:16px;
    margin-top:10px;
}

#game{
    width:300px;
    height:200px;
    background:#111;
    margin:20px auto;
    position:relative;
    border-radius:10px;
}

.target{
    width:30px;
    height:30px;
    background:red;
    position:absolute;
    border-radius:50%;
}
</style>
</head>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8528387078896894"
     crossorigin="anonymous"></script>
<body>

<h1>Web Kiếm Xu + Game</h1>

<div class="box">
<h2>Xu của bạn</h2>
<h1 id="coin">0</h1>

<button onclick="earn()">Nhận Xu</button>
</div>

<h2>Mini Game</h2>
<p>Bấm vào chấm đỏ để kiếm xu</p>

<div id="game">
<div class="target" id="target"></div>
</div>

<script>
let coin = 0

function earn(){
coin++
document.getElementById("coin").innerText = coin
}

const target = document.getElementById("target")

function move(){
let x = Math.random()*260
let y = Math.random()*160
target.style.left = x+"px"
target.style.top = y+"px"
}

target.onclick = function(){
coin += 5
document.getElementById("coin").innerText = coin
move()
}

setInterval(move,1500)
</script>

</body>
</html>
